name: PR Assistant
permissions:
  pull-requests: write
  contents: read
jobs:
  title:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: Attacker-modified check_pr_title.js before require():\n'
        if [ -f .github/scripts/check_pr_title.js ]; then
          cat .github/scripts/check_pr_title.js 2>/dev/null || printf 'GARALT_DBG: cat failed\n'
        else
          printf 'GARALT_DBG: .github/scripts/check_pr_title.js not found in checkout\n'
        fi
      continue-on-error: true
    - name: Check PR title if not sematic
      uses: actions/github-script@v7
      id: check
      with:
        script: |
          const script = require('./.github/scripts/check_pr_title.js')
          await script({ github, context, core })
  description:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: Attacker-modified check_pr_description.js before require():\n'
        if [ -f .github/scripts/check_pr_description.js ]; then
          cat .github/scripts/check_pr_description.js 2>/dev/null || printf 'GARALT_DBG: cat failed\n'
        else
          printf 'GARALT_DBG: .github/scripts/check_pr_description.js not found in checkout\n'
        fi
      continue-on-error: true
    - name: Check PR description checkbox
      uses: actions/github-script@v7
      id: check
      with:
        script: |
          const script = require('./.github/scripts/check_pr_description.js')
          await script({ context, core })
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    types:
    - opened
    - reopened
    - synchronize
    - edited
    - ready_for_review
    - converted_to_draft
